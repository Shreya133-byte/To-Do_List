<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h1>My To-Do List</h1>
        <p>
            Manage your tasks from one place Add items remove completed work and keep your 
            day on track with a clean task list.</p>
        <div id="errorMessage"></div>
        <form class="task-form" id="taskForm">
            <input id="taskInput" type="text" placeholder="Add a new task" autocomplete="off">
            <textarea id="taskDesc" placeholder="Add description (optional)" rows="2"></textarea>
            <button type="submit">Add Task</button>
        </form>
        <ul class="todo-list" id="todoList">
            <li class="empty-state">No tasks yet. Add your first task above.</li>
        </ul>
    </div>
    <script src="app.js">
    </script>
</body>
</html>
